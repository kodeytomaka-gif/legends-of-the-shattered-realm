# Cloudflare Worker (Workers + Static Assets) for Legends of the Shattered Realm.
#
# `next build` produces the static site in ./out, which is served by the [assets]
# binding. The Worker in src/index.ts runs only for non-asset routes (the AI DM
# endpoint /api/dm).
#
# Deploy:  npm run build && npx wrangler deploy
name = "legends-of-the-shattered-realm"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Attach the custom domain to this Worker on deploy. Requires the zone to live in
# the same Cloudflare account (it does — the domain is on Cloudflare Registrar).
routes = [
  { pattern = "legendsoftheshatteredrealm.com", custom_domain = true },
  { pattern = "www.legendsoftheshatteredrealm.com", custom_domain = true },
]

[assets]
directory = "./out"
binding = "ASSETS"
not_found_handling = "404-page"

# Workers AI — powers the AI Dungeon Master (/api/dm). Declared here so it is
# provisioned automatically on deploy; no dashboard step or API keys needed.
[ai]
binding = "AI"
